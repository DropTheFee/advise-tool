<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SüRJ — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;700;900&family=DM+Sans:wght@300;400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#060F18;--card:#0a1624;--teal:#1A8A72;--tealb:#6EDFC8;--purple:#6B3FA0;--purpleb:#9B6FD0;--white:#F0F4F8;--muted:#7A9BB5;--border:rgba(110,223,200,0.12);}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background-image:radial-gradient(ellipse at 20% 50%,rgba(107,63,160,0.15),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(26,138,114,0.1),transparent 50%);}
.wrap{width:100%;max-width:380px;}
.logo{font-family:'Fraunces',serif;font-size:52px;font-weight:900;background:linear-gradient(135deg,#9B6FD0,#6EDFC8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:4px;}
.logo-sub{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:32px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px;}
.card-title{font-family:'Fraunces',serif;font-size:22px;font-weight:900;margin-bottom:4px;}
.card-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.error-msg{background:rgba(184,50,50,0.12);border:1px solid rgba(184,50,50,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#E05555;margin-bottom:16px;}
label{display:block;font-family:'Syne',sans-serif;font-size:9px;font-weight:700;color:var(--tealb);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
input{width:100%;background:#0d1d30;border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;margin-bottom:16px;}
input:focus{border-color:rgba(110,223,200,0.4);}
button{width:100%;padding:14px;background:linear-gradient(135deg,var(--purple),var(--teal));border:none;border-radius:8px;color:var(--white);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;margin-top:4px;}
button:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(107,63,160,0.3);}
.footer{text-align:center;margin-top:20px;font-size:11px;color:var(--muted);}
.footer a{color:var(--tealb);text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">SüRJ</div>
  <div class="logo-sub">ADVISE Discovery Tool</div>
  <div class="card">
    <div class="card-title">Sign In</div>
    <div class="card-sub">Internal access only</div>
    <div id="err-box" style="display:none;" class="error-msg"></div>
    <form method="POST" action="/login">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" autofocus required>
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
      <button type="submit">Sign In →</button>
    </form>
  </div>
  <div class="footer">Need access? Contact <a href="mailto:admin@surj.app">Steve</a></div>
</div>
<script>
var params = new URLSearchParams(window.location.search);
var err = params.get('error');
if (err) {
  var box = document.getElementById('err-box');
  box.textContent = err;
  box.style.display = 'block';
}
</script>
</body>
</html>
